<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVGen AI - API Keys</title>
    <link rel="stylesheet" href="../ui/main.css" />
    <script type="module" src="./index.ts"></script>
  </head>
  <body class="bg-background text-text font-sans antialiased min-h-screen flex flex-col">
    <app-header></app-header>
    <main class="flex-1 max-w-5xl w-full mx-auto px-6 py-8">
      <div id="settings-container">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-semibold text-text tracking-tight">API Management</h2>
        </div>

        <div id="provider-list" class="space-y-8"></div>

        <!-- Add Key Modal -->
        <div
          id="add-key-modal"
          class="fixed inset-0 z-50 items-center justify-center p-4 bg-background/80 hidden backdrop-blur-md transition-all duration-300"
        >
          <div
            class="bg-surface border border-border rounded-2xl w-full max-w-md overflow-hidden shadow-2xl scale-100"
          >
            <div class="px-8 py-6 border-b border-border flex items-center justify-between">
              <h3 class="text-lg font-semibold text-text" id="add-key-title">Add API Key</h3>
              <button
                id="close-modal-btn"
                class="p-2 text-text-secondary hover:text-text transition-all rounded-lg hover:bg-surface-hover"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-x"
                >
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
            <div class="p-8 space-y-6">
              <input type="hidden" id="modal-provider-id" />
              <div class="space-y-2">
                <label class="block text-sm font-medium text-text-secondary ml-1">Key Name</label>
                <input
                  type="text"
                  id="modal-key-name"
                  placeholder="e.g. Primary Key"
                  class="w-full bg-surface-hover/20 border border-border rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted focus:border-primary-light outline-none transition-all"
                />
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-medium text-text-secondary ml-1">Key Value</label>
                <input
                  type="password"
                  id="modal-key-value"
                  placeholder="sk-••••••••••••••••••••••••"
                  class="w-full bg-surface-hover/20 border border-border rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted focus:border-primary-light outline-none transition-all"
                />
              </div>
            </div>
            <div class="px-8 py-6 bg-surface-hover/20 border-t border-border flex justify-end">
              <button id="save-new-key" class="btn-primary px-8 py-3">Save Configuration</button>
            </div>
          </div>
        </div>

        <!-- Edit Key Name Modal -->
        <div
          id="edit-key-modal"
          class="fixed inset-0 z-50 items-center justify-center p-4 bg-background/80 hidden backdrop-blur-md transition-all duration-300"
        >
          <div
            class="bg-surface border border-border rounded-2xl w-full max-w-md overflow-hidden shadow-2xl scale-100"
          >
            <div class="px-8 py-6 border-b border-border flex items-center justify-between">
              <h3 class="text-lg font-semibold text-text">Edit API Key Name</h3>
              <button
                id="close-edit-modal-btn"
                class="p-2 text-text-secondary hover:text-text transition-all rounded-lg hover:bg-surface-hover"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-x"
                >
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
            <div class="p-8 space-y-6">
              <input type="hidden" id="edit-modal-key-id" />
              <div class="space-y-2">
                <label class="block text-sm font-medium text-text-secondary ml-1">Key Name</label>
                <input
                  type="text"
                  id="edit-modal-key-name"
                  placeholder="e.g. Primary Key"
                  class="w-full bg-surface-hover/20 border border-border rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted focus:border-primary-light outline-none transition-all"
                />
              </div>
            </div>
            <div class="px-8 py-6 bg-surface-hover/20 border-t border-border flex justify-end">
              <button id="save-edit-key" class="btn-primary px-8 py-3">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
