<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVGen AI - API Keys</title>
    <link rel="stylesheet" href="../ui/main.css" />
    <script type="module" src="./index.ts"></script>
  </head>
  <body class="bg-background text-text font-sans antialiased min-h-screen flex flex-col">
    <app-header></app-header>
    <main class="flex-1 max-w-5xl w-full mx-auto px-6 py-8">
      <div id="settings-container">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-semibold text-text tracking-tight">API Management</h2>
        </div>

        <div id="provider-list" class="space-y-8"></div>

        <!-- Add Key Modal -->
        <app-modal
          modal-id="add-key-modal"
          title-id="add-key-title"
          modal-title="Add API Key"
          close-btn-id="close-modal-btn"
        >
          <div class="p-8 space-y-6">
            <input type="hidden" id="modal-provider-id" />
            <div class="space-y-2">
              <label class="block text-sm font-medium text-text-secondary ml-1">Key Name</label>
              <input
                type="text"
                id="modal-key-name"
                placeholder="e.g. Primary Key"
                class="w-full bg-transparent border border-border/50 rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted outline-none focus:border-border transition-all"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-sm font-medium text-text-secondary ml-1">Key Value</label>
              <input
                type="password"
                id="modal-key-value"
                placeholder="sk-••••••••••••••••••••••••"
                class="w-full bg-transparent border border-border/50 rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted outline-none focus:border-border transition-all"
              />
            </div>
          </div>
          <div class="px-8 py-6 border-t border-border flex justify-end">
            <button
              id="save-new-key"
              class="bg-text text-background font-medium rounded-lg hover:bg-primary-dark active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-all px-8 py-3"
            >
              Save Configuration
            </button>
          </div>
        </app-modal>

        <!-- Edit Key Name Modal -->
        <app-modal
          modal-id="edit-key-modal"
          title-id="edit-key-title"
          modal-title="Edit API Key Name"
          close-btn-id="close-edit-modal-btn"
        >
          <div class="p-8 space-y-6">
            <input type="hidden" id="edit-modal-key-id" />
            <div class="space-y-2">
              <label class="block text-sm font-medium text-text-secondary ml-1">Key Name</label>
              <input
                type="text"
                id="edit-modal-key-name"
                placeholder="e.g. Primary Key"
                class="w-full bg-transparent border border-border/50 rounded-xl px-4 py-3 text-sm text-text placeholder:text-text-muted outline-none focus:border-border transition-all"
              />
            </div>
          </div>
          <div class="px-8 py-6 border-t border-border flex justify-end">
            <button
              id="save-edit-key"
              class="bg-text text-background font-medium rounded-lg hover:bg-primary-dark active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-all px-8 py-3"
            >
              Save Changes
            </button>
          </div>
        </app-modal>
      </div>
    </main>
  </body>
</html>
