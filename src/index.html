<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SVGen AI</title>
    <link rel="stylesheet" href="./ui/main.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./index.ts"></script>
  </head>
  <body class="bg-background text-text font-sans antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-surface border-b border-border sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex items-center h-16 justify-between">
          <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
              <i data-lucide="zap" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-lg font-semibold tracking-tight text-text leading-none">SVGen</h1>
          </div>

          <div class="flex items-center gap-2">
            <button id="nav-generation" class="nav-item">
              <i data-lucide="sparkles" class="w-4 h-4"></i>
              <span>Generation</span>
            </button>
            <button id="nav-keys" class="nav-item">
              <i data-lucide="key" class="w-4 h-4"></i>
              <span>API Keys</span>
            </button>
            <button id="nav-gallery" class="nav-item">
              <i data-lucide="images" class="w-4 h-4"></i>
              <span>Gallery</span>
            </button>
          </div>

          <div class="w-32 hidden md:block"></div>
          <!-- Spacer for symmetry if needed -->
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Generation Tab -->
      <div id="tab-generation" class="space-y-6">
        <generator-controls></generator-controls>
        <results-grid></results-grid>
      </div>

      <!-- API Keys Tab -->
      <div id="tab-keys" class="hidden space-y-6">
        <api-keys-manager></api-keys-manager>
      </div>

      <!-- Gallery Tab -->
      <div id="tab-gallery" class="hidden space-y-6">
        <gallery-view></gallery-view>
      </div>
    </main>
  </body>
</html>
