<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVGen AI</title>
    <link rel="stylesheet" href="./ui/main.css" />
    <script type="module" src="./index.ts"></script>
  </head>
  <body class="bg-background text-text font-sans antialiased min-h-screen flex flex-col">
    <app-header></app-header>
    <main class="flex-1 max-w-5xl w-full mx-auto px-6 py-8">
      <div id="tab-generation" class="space-y-6">
        <div id="generator-controls-container" class="max-w-5xl mx-auto w-full py-0">
          <div
            class="bg-transparent border border-border hover:bg-surface-hover/10 rounded-xl p-2 transition-all duration-300 focus-within:border-border-bright relative z-20"
          >
            <textarea
              id="prompt-input"
              rows="3"
              class="w-full bg-transparent px-3 py-4 text-text placeholder-text-muted outline-none resize-none leading-relaxed"
              placeholder="Describe the SVG you want to generate (e.g., a glowing isometric cube)..."
            ></textarea>

            <div class="flex items-center justify-between px-2 pb-2 pt-1">
              <div class="flex items-center gap-4 pt-2">
                <!-- Custom Model Selection Dropdown -->
                <div class="relative" id="model-dropdown-container">
                  <button
                    id="model-dropdown-btn"
                    data-selected-model=""
                    data-provider-id=""
                    class="flex items-center gap-2 bg-surface-hover/30 hover:bg-surface-hover/50 border border-transparent hover:border-border-bright rounded-lg px-4 py-2 cursor-pointer transition-all"
                  >
                    <span
                      class="text-xs font-semibold text-text max-w-[150px] truncate"
                      id="model-dropdown-text"
                    >
                      Select an AI model...
                    </span>
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="w-3 h-3 text-text-muted ml-1 transition-transform"
                      id="model-dropdown-icon"
                    >
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </button>

                  <div
                    id="model-dropdown-menu"
                    class="absolute left-0 top-[calc(100%+8px)] bg-background rounded-xl hidden flex-col overflow-hidden transform origin-top-left transition-all z-50 border border-border/50"
                  >
                    <!-- Dynamic modelOptionsHtml -->
                  </div>
                </div>

                <!-- Attach Pill -->
                <div class="flex items-center gap-2">
                  <label
                    class="flex items-center gap-2 bg-surface-hover/30 hover:bg-surface-hover/50 border border-transparent hover:border-border-bright rounded-lg px-4 py-2 cursor-pointer transition-all group"
                    title="Attach reference SVG"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="w-4 h-4 text-text-muted group-hover:text-text-secondary"
                    >
                      <path
                        d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"
                      />
                    </svg>
                    <span class="text-xs font-medium text-text-secondary group-hover:text-text">
                      Attach
                    </span>
                    <input type="file" id="reference-input" accept=".svg" multiple class="hidden" />
                  </label>
                </div>
              </div>

              <button
                id="generate-btn"
                class="bg-surface-hover hover:bg-text text-text hover:text-background w-10 h-10 mt-2 rounded-lg flex items-center justify-center transition-all scale-100 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-5 h-5"
                >
                  <path d="m5 12 7-7 7 7" />
                  <path d="M12 19V5" />
                </svg>
              </button>
            </div>
          </div>
          <div id="attachments-container" class="flex flex-wrap gap-4 mt-6 empty:hidden"></div>
        </div>

        <div id="results-grid-container" class="hidden">
          <div class="max-w-5xl mx-auto w-full mb-12">
            <div
              id="results-grid-inner"
              class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-4 pb-20"
            ></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
